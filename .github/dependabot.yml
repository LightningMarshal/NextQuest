# Weekly dependency updates. Security advisories always open PRs regardless
# of schedule; the weekly batch keeps routine bumps from drowning the repo.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      # Routine minor/patch bumps arrive as one PR; majors stay separate.
      minor-and-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
